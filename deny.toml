[graph]
all-features = true

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Zlib",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "bzip2-1.0.6",
    "CC0-1.0",
    "CDDL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    # Moonlink permission.
    "LicenseRef-BSL-1.1",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]

[sources]
unknown-git = "deny"
allow-git = [
    "https://github.com/apache/opendal-reqsign.git?rev=4214e9715be38b9d2b8a80aa1373fc5d73bd1634",
    "https://github.com/Mooncake-Labs/rust-postgres.git?rev=14c8e599f5551a8caa96ff5023685a6f537a1455",
]

# TODO(hjiang): Cleanup these unmaintained crates.
[advisories]
ignore = [
    "RUSTSEC-2023-0071", # rsa - marvin attack
    "RUSTSEC-2024-0436", # paste - unmaintained
    "RUSTSEC-2025-0134", # rustls-pemfile - unmaintained, transitive
    "RUSTSEC-2025-0141", # bincode - unmaintained
    "RUSTSEC-2026-0098", # rustls-webpki 0.101.x via aws-smithy legacy optional feature
    "RUSTSEC-2026-0099", # rustls-webpki 0.101.x via aws-smithy legacy optional feature
    "RUSTSEC-2026-0104", # rustls-webpki 0.101.x via aws-smithy legacy optional feature
    "RUSTSEC-2026-0173", # proc-macro-error2 - unmaintained, transitive via deltalake
    "RUSTSEC-2026-0194", # quick-xml <0.41.0; known tolerated paths are constrained in bans.deny
    "RUSTSEC-2026-0195", # quick-xml <0.41.0; known tolerated paths are constrained in bans.deny
]

# TODO(hjiang): Resolve all duplicate dependencies.
[bans]
deny = [
    # Keep the global quick-xml advisory ignore from admitting new vulnerable paths.
    # Remove these once all owners below can resolve to quick-xml >=0.41.0.
    { crate = "quick-xml:<0.26.0", reason = "RUSTSEC-2026-0194/0195: do not allow new vulnerable quick-xml versions" },
    { crate = "quick-xml@0.26.0", wrappers = ["inferno"], reason = "RUSTSEC-2026-0194/0195: pprof flamegraph path only" },
    { crate = "quick-xml:>0.26.0, <0.37.5", reason = "RUSTSEC-2026-0194/0195: do not allow new vulnerable quick-xml versions" },
    { crate = "quick-xml@0.37.5", wrappers = ["reqsign"], reason = "RUSTSEC-2026-0194/0195: iceberg-storage-opendal reqsign path only" },
    { crate = "quick-xml:>0.37.5, <0.38.3", reason = "RUSTSEC-2026-0194/0195: do not allow new vulnerable quick-xml versions" },
    { crate = "quick-xml@0.38.3", wrappers = ["opendal"], reason = "RUSTSEC-2026-0194/0195: iceberg-storage-opendal opendal path only" },
    { crate = "quick-xml:>0.38.3, <0.39.4", reason = "RUSTSEC-2026-0194/0195: do not allow new vulnerable quick-xml versions" },
    { crate = "quick-xml@0.39.4", wrappers = ["object_store", "opendal-core", "opendal-service-gcs", "opendal-service-s3"], reason = "RUSTSEC-2026-0194/0195: DataFusion/Delta/OpenDAL path only" },
    { crate = "quick-xml:>0.39.4, <0.41.0", reason = "RUSTSEC-2026-0194/0195: do not allow new vulnerable quick-xml versions" },
]
skip = [
    { name = "axum" },
    { name = "axum-core" },
    { name = "base64" },
    { name = "bitflags" },
    { name = "bzip2" },
    { name = "core-foundation" },
    { name = "darling" },
    { name = "darling_core" },
    { name = "darling_macro" },
    { name = "foldhash" },
    { name = "getrandom" },
    { name = "h2" },
    { name = "hashbrown" },
    { name = "http" },
    { name = "http-body" },
    { name = "hyper" },
    { name = "hyper-rustls" },
    { name = "indexmap" },
    { name = "itertools" },
    { name = "matchit" },
    { name = "nix" },
    { name = "object" },
    { name = "ordered-float" },
    { name = "petgraph" },
    { name = "phf" },
    { name = "phf_shared" },
    { name = "prost" },
    { name = "prost-derive" },
    { name = "prost-types" },
    { name = "quick-xml" },
    { name = "rand" },
    { name = "rand_chacha" },
    { name = "rand_core" },
